[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
blind_auctions = "GLB8HNet6sGBBDLs6QW3sFFNxdLfKMUHSFAxpe9JWs6u"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 60000

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 3600000 \"tests/**/*.ts\""
